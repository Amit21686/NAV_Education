<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App UI Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#020617;color:#fff;}
.header{
padding:15px;
font-size:20px;
font-weight:600;
text-align:center;
background:#0f172a;
border-bottom:1px solid rgba(255,255,255,0.1);
}
.container{max-width:420px;margin:auto;padding:15px;padding-bottom:80px;}
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:15px;
border-radius:16px;
margin-bottom:12px;
}
button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#38bdf8,#6366f1);
color:#fff;
font-weight:600;
margin-top:10px;
}
.option{background:#1e293b;padding:12px;margin:8px 0;border-radius:10px;}
input,select{width:100%;padding:12px;border-radius:10px;border:none;margin-top:10px;background:#1e293b;color:#fff;}
.hidden{display:none;}
.nav{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
justify-content:space-around;
background:#0f172a;
padding:10px 0;
border-top:1px solid rgba(255,255,255,0.1);
}
.nav div{cursor:pointer;font-size:14px;text-align:center;}
</style>
</head>
<body>
<div class="header">STUDY NOTES ~ BY Amit</div>

<div class="container">

<div id="home">
<div class="card">
<h3>Start Quiz</h3>
<input id="name" placeholder="Enter Name">
<select id="subject">
<option>Biology</option>
<option>Physics</option>
<option>Chemistry</option>
</select>
<button onclick="startQuiz()">Start</button>
</div>
</div>

<div id="quiz" class="hidden">
<div class="card">
<div id="q"></div>
<div id="opts"></div>
<button onclick="nextQ()">Next</button>
</div>
</div>

<div id="analytics" class="hidden">
<div class="card">
<h3>Performance</h3>
<canvas id="chart"></canvas>
</div>
</div>

<div id="result" class="hidden"></div>

</div>

<div class="nav">
<div onclick="show('home')">🏠 Home</div>
<div onclick="show('analytics')">📊 Stats</div>
</div>

<script>
const questions={
Biology:[{q:"Cell is unit of?",o:["Life","Matter","Energy","Atom"],a:0}],
Physics:[{q:"Unit of force?",o:["Newton","Joule","Watt","Pascal"],a:0}],
Chemistry:[{q:"H2O is?",o:["Water","Oxygen","Hydrogen","Salt"],a:0}]
};
let data=[],i=0,score=0,name="";
function show(id){
document.querySelectorAll('.container > div').forEach(d=>d.classList.add('hidden'));
document.getElementById(id).classList.remove('hidden');
if(id==='analytics')loadChart();
}
function startQuiz(){
name=document.getElementById('name').value;
let sub=document.getElementById('subject').value;
if(!name)return;
data=questions[sub];
i=0;score=0;
show('quiz');
load();
}
function load(){
let q=data[i];
document.getElementById('q').innerText=q.q;
let html="";
q.o.forEach((o,idx)=>{html+=`<div class='option' onclick='select(${idx})'>${o}</div>`});
document.getElementById('opts').innerHTML=html;
}
let sel=-1;
function select(idx){sel=idx;}
function nextQ(){
if(sel===data[i].a)score++;
i++;sel=-1;
if(i<data.length)load();
else{
let prev=JSON.parse(localStorage.getItem('scores')||"[]");
prev.push(score);
localStorage.setItem('scores',JSON.stringify(prev));
show('home');
alert(name+" Score: "+score);
}
}
function loadChart(){
let scores=JSON.parse(localStorage.getItem('scores')||"[]");
new Chart(document.getElementById('chart'),{
type:'bar',
data:{labels:scores.map((_,i)=>"Test "+(i+1)),datasets:[{data:scores}]}
});
}
</script>

</body>
</html>
