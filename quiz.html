<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz App Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#020617;color:#fff;}
.container{max-width:420px;margin:auto;padding:15px;}
.card{background:#0f172a;padding:15px;border-radius:15px;margin-bottom:12px;}
button{width:100%;padding:12px;border:none;border-radius:10px;background:#38bdf8;color:#000;font-weight:600;margin-top:10px;}
.option{background:#1e293b;padding:10px;margin:8px 0;border-radius:10px;}
.hidden{display:none;}
</style>
</head>
<body>
<div class="container">

<div id="dashboard">
<div class="card">
<h2>Welcome</h2>
<input id="name" placeholder="Enter Name" style="width:100%;padding:10px;border-radius:8px;border:none;margin-top:10px;">
<button onclick="startQuiz()">Start Quiz</button>
</div>
<div class="card">
<h3>Previous Attempts</h3>
<div id="history"></div>
</div>
</div>

<div id="quiz" class="hidden">
<div id="q"></div>
<div id="opts"></div>
<button onclick="nextQ()">Next</button>
</div>

<div id="result" class="hidden"></div>

</div>
<script>
const data=[
{q:"Cell is unit of?",o:["Life","Matter","Energy","Atom"],a:0},
{q:"DNA found in?",o:["Nucleus","Ribosome","Cell wall","Membrane"],a:0},
{q:"Mitosis produces?",o:["2 cells","4 cells","1 cell","No cell"],a:0}
];
let i=0,score=0,name="";
function loadHistory(){
let prev=JSON.parse(localStorage.getItem('scores')||"[]");
let html="";
prev.forEach(p=>{html+=`<div>${p.name}: ${p.score}</div>`});
document.getElementById('history').innerHTML=html||"No attempts yet";
}
loadHistory();
function startQuiz(){
name=document.getElementById('name').value;
if(!name)return;
document.getElementById('dashboard').classList.add('hidden');
document.getElementById('quiz').classList.remove('hidden');
load();
}
function load(){
let q=data[i];
document.getElementById('q').innerText=q.q;
let html="";
q.o.forEach((o,idx)=>{
html+=`<div class='option' onclick='select(${idx})'>${o}</div>`;
});
document.getElementById('opts').innerHTML=html;
}
let sel=-1;
function select(idx){sel=idx;}
function nextQ(){
if(sel===data[i].a)score++;
i++;sel=-1;
if(i<data.length)load();
else{
let prev=JSON.parse(localStorage.getItem('scores')||"[]");
prev.push({name,score});
localStorage.setItem('scores',JSON.stringify(prev));
document.getElementById('quiz').classList.add('hidden');
document.getElementById('result').classList.remove('hidden');
document.getElementById('result').innerHTML=`<div class='card'><h2>${name}</h2><p>Score: ${score}/${data.length}</p><button onclick='location.reload()'>Back to Dashboard</button></div>`;
}
}
</script>
</body>
</html>
