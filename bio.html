<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Biology MCQ OMR Practice</title>

<style>

body{
margin:0;
font-family:Poppins, sans-serif;
background:#1a1a1a;
color:white;
}

.container{
display:flex;
flex-direction:column;
height:100vh;
}

/* PDF */

.pdf-container{
height:70vh;
overflow-y:auto;
background:white;
border-bottom:2px solid #444;
padding:10px;
}

canvas{
display:block;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.3);
}

/* RANGE NAV */

.nav{
display:flex;
justify-content:center;
gap:8px;
padding:8px;
background:#222;
flex-wrap:wrap;
}

.nav button{
padding:6px 12px;
border:none;
background:#444;
color:white;
border-radius:6px;
cursor:pointer;
}

/* OMR */

.omr{
height:30vh;
overflow-y:auto;
padding:10px;
background:#141414;
}

.row{
display:flex;
align-items:center;
gap:15px;
padding:10px 0;
border-bottom:1px solid #333;
}

.qno{
width:40px;
font-weight:bold;
color:#8fdcff;
}

.options{
display:flex;
gap:12px;
}

.bubble{
width:36px;
height:36px;
border-radius:50%;
border:2px solid #ccc;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* CORRECT */

.correct{
background:#00e676;
border-color:#00e676;
color:black;
}

/* WRONG */

.wrong{
background:#ff5252;
border-color:#ff5252;
color:white;
}

</style>

</head>

<body>

<div class="pdf-container" id="pdfContainer"></div>

<div class="nav">

<button onclick="showRange(1,50)">1-50</button>

const url="https://amit21686.github.io/NAV_Education/BIOLOGY%20MCQS.pdf";

let pdfDoc=null;
let scale=1.4;

const container=document.getElementById("pdfContainer");

function renderPDF(){

container.innerHTML="";

for(let pageNum=1;pageNum<=pdfDoc.numPages;pageNum++){

pdfDoc.getPage(pageNum).then(page=>{

const viewport=page.getViewport({scale:scale});

const outputScale=window.devicePixelRatio || 2;

const canvas=document.createElement("canvas");

const ctx=canvas.getContext("2d");

canvas.width=Math.floor(viewport.width*outputScale);
canvas.height=Math.floor(viewport.height*outputScale);

canvas.style.width=viewport.width+"px";
canvas.style.height=viewport.height+"px";

ctx.setTransform(outputScale,0,0,outputScale,0,0);

container.appendChild(canvas);

page.render({
canvasContext:ctx,
viewport:viewport
});

});

}

}

pdfjsLib.getDocument(url).promise.then(pdf=>{
pdfDoc=pdf;
renderPDF();
});


/* OMR */

let sheet=document.getElementById("sheet");

function showRange(start,end){

sheet.innerHTML="";

for(let i=start;i<=end;i++){

let row=document.createElement("div");

row.className="row";

row.innerHTML=`

<div class="qno">${i}</div>

<div class="options">

<div class="bubble" onclick="select(this,${i},'A')">A</div>
<div class="bubble" onclick="select(this,${i},'B')">B</div>
<div class="bubble" onclick="select(this,${i},'C')">C</div>
<div class="bubble" onclick="select(this,${i},'D')">D</div>

</div>
`;

sheet.appendChild(row);

}

}

function select(el,q,opt){

let correct=answerKey[q];

let parent=el.parentElement;

let bubbles=parent.querySelectorAll(".bubble");

bubbles.forEach(b=>{

b.classList.remove("correct");
b.classList.remove("wrong");

});

if(opt===correct){

el.classList.add("correct");

}else{

el.classList.add("wrong");

}

}

showRange(1,50);
