<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium UI Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
background:linear-gradient(135deg,#0f172a,#020617);
color:#fff;
}
.container{max-width:420px;margin:auto;padding:15px;}
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.1);
padding:18px;
border-radius:18px;
margin-bottom:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.4);
}
button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#38bdf8,#6366f1);
color:#fff;
font-weight:600;
margin-top:12px;
transition:0.3s;
}
button:hover{transform:scale(1.04);}
.option{
background:#1e293b;
padding:12px;
margin:8px 0;
border-radius:12px;
transition:0.2s;
}
.option:hover{background:#334155;}
.hidden{display:none;}
input,select{width:100%;padding:12px;border-radius:10px;border:none;margin-top:10px;background:#1e293b;color:#fff;}
</style>
</head>
<body>
<div class="container">
<div id="dashboard">
<div class="card">
<h2>Start Quiz</h2>
<input id="name" placeholder="Enter Name">
<select id="subject">
<option>Biology</option>
<option>Physics</option>
<option>Chemistry</option>
</select>
<button onclick="startQuiz()">Start</button>
</div>
<div class="card">
<h3>Performance</h3>
<canvas id="chart"></canvas>
</div>
</div>
<div id="quiz" class="hidden">
<div class="card">
<div id="q"></div>
<div id="opts"></div>
<button onclick="nextQ()">Next</button>
</div>
</div>
<div id="result" class="hidden"></div>
</div>
<script>
const questions={
Biology:[{q:"Cell is unit of?",o:["Life","Matter","Energy","Atom"],a:0}],
Physics:[{q:"Unit of force?",o:["Newton","Joule","Watt","Pascal"],a:0}],
Chemistry:[{q:"H2O is?",o:["Water","Oxygen","Hydrogen","Salt"],a:0}]
};
let data=[],i=0,score=0,name="";
function startQuiz(){
name=document.getElementById('name').value;
let sub=document.getElementById('subject').value;
if(!name)return;
data=questions[sub];
document.getElementById('dashboard').classList.add('hidden');
document.getElementById('quiz').classList.remove('hidden');
load();
}
function load(){
let q=data[i];
document.getElementById('q').innerText=q.q;
let html="";
q.o.forEach((o,idx)=>{html+=`<div class='option' onclick='select(${idx})'>${o}</div>`});
document.getElementById('opts').innerHTML=html;
}
let sel=-1;
function select(idx){sel=idx;}
function nextQ(){
if(sel===data[i].a)score++;
i++;sel=-1;
if(i<data.length)load();
else{
let prev=JSON.parse(localStorage.getItem('scores')||"[]");
prev.push(score);
localStorage.setItem('scores',JSON.stringify(prev));
document.getElementById('quiz').classList.add('hidden');
document.getElementById('result').classList.remove('hidden');
document.getElementById('result').innerHTML=`<div class='card'><h2>${name}</h2><p>Score: ${score}</p><button onclick='location.reload()'>Back</button></div>`;
loadChart();
}
}
function loadChart(){
let scores=JSON.parse(localStorage.getItem('scores')||"[]");
new Chart(document.getElementById('chart'),{
type:'bar',
data:{labels:scores.map((_,i)=>"Test "+(i+1)),datasets:[{data:scores}]}
});
}
loadChart();
</script>
</body>
</html>
