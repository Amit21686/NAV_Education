<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Biology MCQ OMR Practice</title>

<style>

body{
margin:0;
font-family:Poppins,sans-serif;
background:#1a1a1a;
color:white;
}

.container{
display:flex;
flex-direction:column;
height:100vh;
}

/* PDF */

.pdf-container{
height:70vh;
overflow-y:auto;
background:white;
border-bottom:2px solid #444;
padding:10px;
}

canvas{
display:block;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.3);
}

/* RANGE NAV */

.nav{
display:flex;
align-items:center;
gap:8px;
padding:8px;
background:#222;
flex-wrap:wrap;
}

.rangeBtn{
padding:6px 12px;
border:none;
background:#444;
color:white;
border-radius:6px;
cursor:pointer;
}

.rangeBtn.active{
background:#00bcd4;
color:black;
font-weight:bold;
}

/* LOCK ICON */

.lockIcon{
font-size:22px;
cursor:pointer;
padding:0 10px;
transition:0.2s;
}

/* SCORE */

.result{
display:flex;
justify-content:space-around;
background:#111;
padding:8px;
font-weight:bold;
}

.correctCount{color:#00e676;}
.wrongCount{color:#ff5252;}
.attemptCount{color:#4fc3f7;}

/* OMR */

.omr{
height:30vh;
overflow-y:auto;
padding:10px;
background:#141414;
}

.row{
display:flex;
align-items:center;
gap:15px;
padding:10px 0;
border-bottom:1px solid #333;
}

.qno{
width:40px;
font-weight:bold;
color:#8fdcff;
}

.options{
display:flex;
gap:12px;
}

.bubble{
width:36px;
height:36px;
border-radius:50%;
border:2px solid #ccc;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.correct{
background:#00e676;
border-color:#00e676;
color:black;
}

.wrong{
background:#ff5252;
border-color:#ff5252;
color:white;
}

</style>

</head>

<body>

<div class="container">

<!-- PDF -->

<div class="pdf-container" id="pdfContainer"></div>

<!-- RANGE NAV -->

<div class="nav">

<button class="rangeBtn" onclick="showRange(1,50,this)">1-50</button>
<button class="rangeBtn" onclick="showRange(51,100,this)">51-100</button>
<button class="rangeBtn" onclick="showRange(101,150,this)">101-150</button>
<button class="rangeBtn" onclick="showRange(151,200,this)">151-200</button>

<div class="lockIcon" id="lockIcon">🔓</div>

<button class="rangeBtn" onclick="showRange(201,250,this)">201-250</button>
<button class="rangeBtn" onclick="showRange(251,300,this)">251-300</button>
<button class="rangeBtn" onclick="showRange(301,350,this)">301-350</button>
<button class="rangeBtn" onclick="showRange(351,395,this)">351-395</button>

</div>
<!-- SCORE -->

<div class="result">

<div>Correct: <span id="correct" class="correctCount">0</span></div>
<div>Wrong: <span id="wrong" class="wrongCount">0</span></div>
<div>Attempted: <span id="attempt" class="attemptCount">0</span></div>

</div>

<!-- OMR -->

<div class="omr" id="sheet"></div>

</div>

/* PDF */

const url="https://amit21686.github.io/NAV_Education/BIOLOGY%20MCQS.pdf";

let pdfDoc=null;
let scale=1.4;

const container=document.getElementById("pdfContainer");

function renderPDF(){

container.innerHTML="";

for(let pageNum=1;pageNum<=pdfDoc.numPages;pageNum++){

pdfDoc.getPage(pageNum).then(page=>{

const viewport=page.getViewport({scale:scale});
const outputScale=window.devicePixelRatio||2;

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

canvas.width=Math.floor(viewport.width*outputScale);
canvas.height=Math.floor(viewport.height*outputScale);

canvas.style.width=viewport.width+"px";
canvas.style.height=viewport.height+"px";

ctx.setTransform(outputScale,0,0,outputScale,0,0);

container.appendChild(canvas);

page.render({
canvasContext:ctx,
viewport:viewport
});

});

}

}

pdfjsLib.getDocument(url).promise.then(pdf=>{
pdfDoc=pdf;
renderPDF();
});


/* OMR */

let answers={};
let sheet=document.getElementById("sheet");

function showRange(start,end,btn){

sheet.innerHTML="";

document.querySelectorAll(".rangeBtn").forEach(b=>{
b.classList.remove("active");
});

btn.classList.add("active");

for(let i=start;i<=end;i++){

let row=document.createElement("div");

row.className="row";

row.innerHTML=`

<div class="qno">${i}</div>

<div class="options">

<div class="bubble" onclick="select(this,${i},'A')">A</div>
<div class="bubble" onclick="select(this,${i},'B')">B</div>
<div class="bubble" onclick="select(this,${i},'C')">C</div>
<div class="bubble" onclick="select(this,${i},'D')">D</div>

</div>
`;

sheet.appendChild(row);

}

}

let locked=false;

function select(el,q,opt){

if(locked && answers[q]) return;

answers[q]=opt;

let correct=answerKey[q];

let parent=el.parentElement;

let bubbles=parent.querySelectorAll(".bubble");

bubbles.forEach(b=>{
b.classList.remove("correct","wrong");
});

if(opt===correct){
el.classList.add("correct");
}else{
el.classList.add("wrong");
}

updateScore();

}

function updateScore(){

let correct=0;
let wrong=0;
let attempted=0;

for(let q in answers){

attempted++;

if(answers[q]===answerKey[q]) correct++;
else wrong++;

}

document.getElementById("correct").innerText=correct;
document.getElementById("wrong").innerText=wrong;
document.getElementById("attempt").innerText=attempted;

}

/* LOCK ICON */

const lockIcon=document.getElementById("lockIcon");

lockIcon.onclick=function(){

locked=!locked;

if(locked){
lockIcon.innerText="🔒";
}else{
lockIcon.innerText="🔓";
}

}

/* DEFAULT */

showRange(1,50,document.querySelector(".rangeBtn"));
